<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#05263a"/>
      <stop offset="100%" stop-color="#072e2a"/>
    </linearGradient>
    <filter id="f" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#g)"/>

  <!-- decorative diagonal stripes -->
  <g opacity="0.06" fill="#ffffff">
    <rect x="-200" y="-200" width="600" height="1200" transform="rotate(-25 0 0)"/>
    <rect x="200" y="-200" width="600" height="1200" transform="rotate(-25 0 0)"/>
    <rect x="600" y="-200" width="600" height="1200" transform="rotate(-25 0 0)"/>
  </g>

  <!-- play button -->
  <g transform="translate(160,140)" filter="url(#f)">
    <rect x="0" y="0" width="640" height="360" rx="18" fill="#071e25" opacity="0.5"/>
    <circle cx="320" cy="180" r="64" fill="#10b981" opacity="0.95"/>
    <path d="M300 156 L300 204 L348 180 Z" fill="#062018"/>
  </g>

  <!-- title -->
  <g transform="translate(840,460)">
    <text x="0" y="0" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="34" font-weight="700" fill="#e6fdf6">Demo: SportVision AI</text>
    <text x="0" y="36" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="14" fill="#a7efe1">Click to view the full demo video</text>
  </g>

  <!-- subtle branding bottom-left -->
  <g transform="translate(28,660)">
    <rect x="0" y="-26" width="110" height="34" rx="8" fill="#072e2a" opacity="0.6"/>
    <text x="14" y="0" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="12" fill="#9beacb">SportVision AI</text>
  </g>
</svg>
